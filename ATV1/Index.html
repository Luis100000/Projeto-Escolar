<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Escolar de Apoio</title>

<style>
:root{
    --primary:#2563eb;
    --primary2:#1d4ed8;
    --bg:#f4f8ff;
    --card:#ffffff;
    --text:#1e293b;
    --text2:#64748b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:linear-gradient(135deg,#dbeafe,#f8fafc);
    color:var(--text);
    padding-top:100px;
}

nav{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:95%;
    max-width:1000px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding:15px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

nav a{
    text-decoration:none;
    color:#555;
    padding:10px 18px;
    border-radius:999px;
    transition:.3s;
    font-weight:bold;
}

nav a:hover{
    background:var(--primary);
    color:#fff;
}

#app{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

section{
    background:var(--card);
    padding:35px;
    margin-bottom:30px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.3s;
}

section:hover{
    transform:translateY(-5px);
}

h1{
    color:var(--primary);
    margin-bottom:20px;
}

h2{
    margin-top:20px;
    color:var(--primary);
}

p{
    color:var(--text2);
    line-height:1.7;
    margin:10px 0;
}

ul{
    list-style:none;
}

li{
    padding:12px;
    margin:10px 0;
    background:#eef5ff;
    border-left:5px solid var(--primary);
    border-radius:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#f8fbff;
    padding:20px;
    border-radius:15px;
    border:1px solid #dbeafe;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(37,99,235,.15);
}

@media(max-width:700px){

body{
padding-top:150px;
}

section{
padding:20px;
}

}
</style>

</head>
<body>

<nav id="menu"></nav>

<div id="app"></div>

<script>

const paginas=[

{
id:"inicio",
titulo:"Bem-vindo",
conteudo:`
<p><strong>Escola:</strong> Escola Exemplo</p>

<p><strong>Projeto:</strong> Sistema Escolar de Apoio</p>

<p>Este sistema ajuda alunos e professores a organizar atividades, acompanhar tarefas e compartilhar informações.</p>
`
},

{
id:"projeto",
titulo:"Projeto Escolar",
conteudo:`
<p>O objetivo do projeto é melhorar a comunicação entre alunos e professores utilizando uma plataforma simples e moderna.</p>
`
},

{
id:"problema",
titulo:"Problema",
conteudo:`
<h2>Contexto</h2>

<p>Os grupos têm dificuldades para acompanhar tarefas e prazos.</p>

<h2>Solução</h2>

<p>Um sistema online para organizar atividades, avisos e usuários.</p>
`
},

{
id:"funcionalidades",
titulo:"Funcionalidades",
conteudo:`
<ul>
<li>Cadastro de tarefas</li>
<li>Quadro de avisos</li>
<li>Perfis de alunos e professores</li>
<li>Entrega de atividades</li>
<li>Relatórios de desempenho</li>
</ul>
`
},

{
id:"painel",
titulo:"Painel Principal",
conteudo:`
<div class="grid">

<div class="card">
<h3>Avisos</h3>
<p>Comunicados importantes.</p>
</div>

<div class="card">
<h3>Tarefas</h3>
<p>Lista de atividades.</p>
</div>

<div class="card">
<h3>Usuários</h3>
<p>Controle de alunos e professores.</p>
</div>

</div>
`
}

];

const app=document.getElementById("app");
const menu=document.getElementById("menu");

paginas.forEach(p=>{

const link=document.createElement("a");
link.href="#"+p.id;
link.textContent=p.titulo;
menu.appendChild(link);

const sec=document.createElement("section");
sec.id=p.id;
sec.innerHTML=`<h1>${p.titulo}</h1>${p.conteudo}`;
app.appendChild(sec);

});

</script>

</body>
</html>
```
