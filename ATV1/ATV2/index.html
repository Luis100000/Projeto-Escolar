<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre o Projeto</title>
  
  <style>
    /* ==========================================
       CONFIGURAÇÕES GERAIS (RESET & FONTE)
       ========================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      background-color: #f4f6f9;
      color: #333333;
      line-height: 1.6;
      padding-bottom: 80px;
    }

    /* ==========================================
       HEADER (CABEÇALHO)
       ========================================== */
    header {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #ffffff;
      text-align: center;
      padding: 50px 20px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ==========================================
       NAV (MENU DE NAVEGAÇÃO)
       ========================================== */
    nav {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: #555555;
      text-decoration: none;
      padding: 16px 24px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s ease-in-out;
    }

    nav a:hover {
      color: #2a5298;
      background-color: #f0f4f8;
    }

    /* Destaque para a página atual */
    nav a.active {
      color: #1e3c72;
      background-color: #e2ebf0;
      border-bottom: 3px solid #1e3c72;
    }

    /* ==========================================
       CONTEÚDO PRINCIPAL (CONTAINER)
       ========================================== */
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 40px;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .container h2 {
      color: #1e3c72;
      margin-bottom: 20px;
      font-size: 1.8rem;
      border-bottom: 2px solid #f0f4f8;
      padding-bottom: 10px;
    }

    .container p {
      font-size: 1.1rem;
      color: #555555;
    }

    /* ==========================================
       FOOTER (RODAPÉ)
       ========================================== */
    footer {
      text-align: center;
      padding: 20px;
      background-color: #1e3c72;
      color: #ffffff;
      font-size: 0.9rem;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h1>Sobre</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="sobre.html" class="active">Sobre</a>
  <a href="contato.html">Contato</a>
  <a href="projeto.html">Projeto</a>
  <a href="galeria.html">Galeria</a>
</nav>

<main class="container">
  <h2>Sobre o Projeto</h2>
  <p>Este site demonstra um projeto com páginas HTML interligadas utilizando uma folha de estilos CSS interna para manter a consistência visual.</p>
</main>

<footer>
  <p>Projeto escolar &copy; 2026</p>
</footer>

</body>
</html>
